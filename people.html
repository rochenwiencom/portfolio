<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" aria-label="Close"></button>
  <img src="" alt="" id="lightbox-img" />
</div>

<script>
  const lightbox    = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  document.querySelectorAll('.photo').forEach(btn => {
    btn.addEventListener('click', () => {
      lightboxImg.src = btn.dataset.src;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    });
  });

  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
    document.body.style.overflow = '';
  }

  document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ── MASONRY ──
  const ROW_UNIT = 10;
  const GAP = 13;

  function spanItem(item) {
    const img = item.querySelector('img');
    if (!img.naturalWidth) return;
    const grid = item.closest('.photo-grid');
    const cols = window.innerWidth <= 768 ? 2 : 3;
    const colWidth = (grid.getBoundingClientRect().width - GAP * (cols - 1)) / cols;
    const imgHeight = (img.naturalHeight / img.naturalWidth) * colWidth;
    item.style.gridRowEnd = `span ${Math.ceil((imgHeight + GAP) / ROW_UNIT)}`;
  }

  function runMasonry() {
    document.querySelectorAll('.photo-grid .photo').forEach(spanItem);
  }

  document.querySelectorAll('.photo-grid img').forEach(img => {
    if (img.complete && img.naturalWidth) {
      spanItem(img.closest('.photo'));
    } else {
      img.addEventListener('load', () => spanItem(img.closest('.photo')));
    }
  });
  window.addEventListener('resize', runMasonry);

  // ── SCROLL REVEAL ──
  const revealEls = document.querySelectorAll('.photo');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const delay = entry.target.dataset.delay || 0;
        setTimeout(() => entry.target.classList.add('visible'), delay);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08 });

  revealEls.forEach((el, i) => {
    el.dataset.delay = (i % 3) * 80;
    observer.observe(el);
  });

  const hamburger = document.querySelector('.hamburger');
  const nav = document.getElementById('site-nav');
  hamburger.addEventListener('click', () => {
    const isOpen = nav.classList.toggle('open');
    hamburger.classList.toggle('open', isOpen);
    hamburger.setAttribute('aria-expanded', String(isOpen));
    document.body.style.overflow = isOpen ? 'hidden' : '';
  });
  nav.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      nav.classList.remove('open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    });
  });
</script>
